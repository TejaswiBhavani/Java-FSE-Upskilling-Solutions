<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 16 Positioning</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <!-- Relative & Absolute Badge -->
        <div class="position-relative d-inline-block p-4 bg-light border">
            <img src="https://via.placeholder.com/100" alt="Box">
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
                99+
            </span>
        </div>
    </div>

    <!-- Fixed Footer -->
    <footer class="position-fixed bottom-0 w-100 p-3 bg-dark text-white text-center">
        Fixed Footer Bottom
    </footer>
</body>
</html>
