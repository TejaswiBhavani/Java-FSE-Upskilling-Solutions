<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 11 Cards & Media Objects</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <!-- Profile Card -->
        <div class="card" style="width: 18rem;">
          <img src="https://via.placeholder.com/150" class="card-img-top" alt="Profile">
          <div class="card-body">
            <h5 class="card-title">Jane Doe</h5>
            <p class="card-text">Event Coordinator</p>
            <a href="#" class="btn btn-primary">Contact</a>
          </div>
        </div>

        <!-- Media Object layout using Flexbox (since Media Objects are removed in BS5, we use d-flex) -->
        <div class="d-flex align-items-start mt-4 border p-3">
          <img src="https://via.placeholder.com/64" class="me-3 rounded" alt="avatar">
          <div>
            <h5 class="mt-0">Event Update</h5>
            <p>The upcoming music festival has been relocated.</p>
          </div>
        </div>
    </div>
</body>
</html>
