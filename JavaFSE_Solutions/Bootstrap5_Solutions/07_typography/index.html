<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 07 Typography</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h1 class="display-1">Huge Display 1</h1>
        <p class="lead">This is a lead paragraph for emphasis.</p>
        <p class="text-muted fw-bold">Bold, muted text.</p>
        <p class="text-uppercase">uppercase text</p>
        <p class="text-lowercase">LOWERCASE TEXT</p>
        <p class="text-capitalize">capitalized text example</p>
    </div>
</body>
</html>
