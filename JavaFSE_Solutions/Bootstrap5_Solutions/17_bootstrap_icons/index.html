<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 17 Icons</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
</head>
<body>
    <div class="container mt-4 text-center">
        <h2>Action Buttons</h2>
        <!-- Icon only button -->
        <button class="btn btn-outline-primary"><i class="bi bi-download"></i></button>
        <button class="btn btn-danger"><i class="bi bi-trash"></i></button>
    </div>

    <!-- Footer with Social Icons -->
    <footer class="mt-5 p-3 bg-light text-center">
        <a href="#" class="text-dark me-3"><i class="bi bi-facebook fs-3"></i></a>
        <a href="#" class="text-dark me-3"><i class="bi bi-twitter fs-3"></i></a>
        <a href="#" class="text-dark"><i class="bi bi-instagram fs-3"></i></a>
    </footer>
</body>
</html>
