<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 05 Alignment</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <!-- Alignment -->
        <div class="row justify-content-center align-items-center mb-5" style="height: 150px; background-color: #eee;">
            <div class="col-4 bg-primary text-white text-center p-3">Centered Content</div>
        </div>

        <!-- Reordering -->
        <div class="row">
            <!-- Appears second on md+, but first on mobile -->
            <div class="col-md-6 order-md-2 bg-success text-white p-3">Content 1 (order-md-2)</div>
            <!-- Appears first on md+, but second on mobile -->
            <div class="col-md-6 order-md-1 bg-warning p-3">Content 2 (order-md-1)</div>
        </div>
    </div>
</body>
</html>
