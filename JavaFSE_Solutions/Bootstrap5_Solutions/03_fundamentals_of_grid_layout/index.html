<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 03 Responsive Grid</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <h2>Responsive Grid</h2>
        <div class="row">
            <!-- Mobile: Stack vertically (col-12), Tablet: 2 per row (col-md-6), Desktop: 3 per row (col-lg-4) -->
            <div class="col-12 col-md-6 col-lg-4 p-3 bg-light border">Column 1</div>
            <div class="col-12 col-md-6 col-lg-4 p-3 bg-light border">Column 2</div>
            <div class="col-12 col-md-6 col-lg-4 p-3 bg-light border">Column 3</div>
        </div>
    </div>
</body>
</html>
