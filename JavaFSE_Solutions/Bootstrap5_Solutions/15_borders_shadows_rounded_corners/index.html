<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 15 Borders & Shadows</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4 text-center">
        <!-- Image borders & rounding -->
        <img src="https://via.placeholder.com/150" class="border border-primary border-3 rounded-circle mb-4" alt="Circular Image">

        <!-- Card Shadows & Pill -->
        <div class="card shadow-lg rounded-pill mx-auto mt-4" style="width: 18rem; padding: 20px;">
            <div class="card-body">
                Highly shadowed pill card
            </div>
        </div>
    </div>
</body>
</html>
