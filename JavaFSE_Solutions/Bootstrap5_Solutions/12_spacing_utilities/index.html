<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 12 Spacing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container py-5">
        <h2 class="text-center mb-4">Pricing Section</h2>
        <div class="row text-center mt-4">
            <div class="col-md-4 mb-3">
                <div class="card p-2 m-3 border-primary">
                    <div class="card-body">Basic Plan</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card py-5 border-success border-2 shadow">
                    <div class="card-body">Premium Plan</div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card p-2 m-3 border-warning">
                    <div class="card-body">Pro Plan</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
