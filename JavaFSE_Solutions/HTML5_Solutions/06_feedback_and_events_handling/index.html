<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Feedback & Events Handling</title>
    <style>
        img.enlargeable { width: 100px; transition: transform 0.2s; cursor: pointer; }
        img.enlarged { transform: scale(2); }
    </style>
</head>
<body>
    <h2>User Feedback & Event Interaction</h2>
    
    <label>Phone Number (onblur validation):</label>
    <input type="text" id="phoneInput" onblur="validatePhone()">
    <span id="phoneError" style="color:red; display:none;">Invalid format (use 10 digits)</span><br><br>

    <label>Event Type (onchange fee):</label>
    <select id="eventDropdown" onchange="showFee()">
        <option value="">Select an Event</option>
        <option value="10">Art Fair ()</option>
        <option value="25">Music Fest ()</option>
    </select>
    <span id="feeDisplay"></span><br><br>

    <button onclick="confirmSubmit()">Submit Feedback (onclick)</button><br><br>

    <p>Double-click image to enlarge (ondblclick):</p>
    <img src="https://via.placeholder.com/100" class="enlargeable" ondblclick="this.classList.toggle('enlarged')"><br><br>

    <label>Feedback (key events char count):</label><br>
    <textarea id="feedbackText" rows="4" onkeyup="countChars()"></textarea>
    <p>Characters: <span id="charCount">0</span></p>

    <script>
        function validatePhone() {
            const input = document.getElementById('phoneInput').value;
            document.getElementById('phoneError').style.display = /^\d{10}$/.test(input) ? 'none' : 'inline';
        }
        function showFee() {
            const fee = document.getElementById('eventDropdown').value;
            document.getElementById('feeDisplay').innerText = fee ? 'Fee: $' + fee : '';
        }
        function confirmSubmit() {
            alert('Feedback submitted successfully!');
        }
        function countChars() {
            document.getElementById('charCount').innerText = document.getElementById('feedbackText').value.length;
        }
    </script>
</body>
</html>
