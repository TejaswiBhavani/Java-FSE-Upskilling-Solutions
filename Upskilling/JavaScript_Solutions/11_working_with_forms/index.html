<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>JS 11 Forms</title>
<style>.error { color: red; display: none; }</style></head>
<body>
    <form id="regForm">
        <input type="text" name="userName" placeholder="Name"><br>
        <span class="error" id="nameError">Name required</span><br>
        <input type="email" name="userEmail" placeholder="Email"><br>
        <span class="error" id="emailError">Invalid email</span><br>
        <button type="submit">Submit</button>
    </form>
    <script src="main.js"></script>
</body>
</html>
