<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Event Registration</title>
    <style>
        .registration-form {
            max-width: 400px; margin: 20px auto; padding: 20px;
            border: 1px solid #aaa; border-radius: 8px;
            background-color: #f9f9f9;
        }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 5px; }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="registration-form">
        <h2>Register for an Event</h2>
        <form oninput="confMsg.value = nameInput.value ? 'Registration ready for ' + nameInput.value : ''" onsubmit="event.preventDefault(); alert('Submitted!');">
            <div class="form-group">
                <label>Name:</label>
                <input type="text" id="nameInput" name="name" placeholder="John Doe" autofocus required>
            </div>
            <div class="form-group">
                <label>Email:</label>
                <input type="email" name="email" placeholder="john@example.com" required>
            </div>
            <div class="form-group">
                <label>Date:</label>
                <input type="date" name="date" required>
            </div>
            <div class="form-group">
                <label>Event Type:</label>
                <select name="eventType" required>
                    <option value="">Select Event</option>
                    <option value="art">Art Fair</option>
                    <option value="music">Music Festival</option>
                    <option value="tech">Tech Meetup</option>
                </select>
            </div>
            <div class="form-group">
                <label>Message:</label>
                <textarea name="message" rows="4" placeholder="Any special requests?"></textarea>
            </div>
            <button type="submit">Submit Registration</button>
            <br><br>
            <output name="confMsg" for="nameInput"></output>
        </form>
    </div>
</body>
</html>
