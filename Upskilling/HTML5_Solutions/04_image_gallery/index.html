<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Image Gallery</title>
    <style>
        .gallery-img {
            border: 2px solid #333;
            width: 200px;
            height: auto;
        }
        table, th, td {
            border: 1px solid #ccc;
            border-collapse: collapse;
        }
        td { padding: 10px; text-align: center; }
    </style>
</head>
<body>
    <h2>Community Events Gallery</h2>
    <table>
        <caption>Past Community Events Highlights</caption>
        <tr>
            <td><img src="../../assets/images/art_fair.svg" alt="Art Fair" title="Annual Art Fair" class="gallery-img"></td>
            <td><img src="../../assets/images/music_fest.svg" alt="Music Fest" title="Summer Music Fest" class="gallery-img"></td>
            <td><img src="../../assets/images/tech_meetup.svg" alt="Food Truck" title="Street Food Truck" class="gallery-img"></td>
        </tr>
        <tr>
            <td><img src="https://via.placeholder.com/200?text=Event+4" alt="Marathon" title="City Marathon" class="gallery-img"></td>
            <td><img src="https://via.placeholder.com/200?text=Event+5" alt="Tech Meetup" title="Local Tech Meetup" class="gallery-img"></td>
            <td><img src="https://via.placeholder.com/200?text=Event+6" alt="Book Drive" title="Charity Book Drive" class="gallery-img"></td>
        </tr>
    </table>
</body>
</html>
