<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BS5 - 04 Grid Layouts</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-4">
        <!-- Layout 1: Sidebar and Content -->
        <div class="row mb-5">
            <div class="col-12 col-md-3 bg-dark text-white p-3">Sidebar (col-md-3)</div>
            <div class="col-12 col-md-9 bg-light p-3">Main Content (col-md-9)</div>
        </div>

        <!-- Layout 2: Four equal columns -->
        <div class="row">
            <div class="col-sm-3 bg-info p-2 border">Four Col 1</div>
            <div class="col-sm-3 bg-info p-2 border">Four Col 2</div>
            <div class="col-sm-3 bg-info p-2 border">Four Col 3</div>
            <div class="col-sm-3 bg-info p-2 border">Four Col 4</div>
        </div>
    </div>
</body>
</html>
